spring:
  application:
    name: restaurant-pos
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_pos
    username: pos_user
    password: pos_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

app:
  jwt:
    # Dev-only default. In production, set JWT_SECRET in the environment —
    # the app must not run with this placeholder value.
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
    expiration-ms: 86400000    # 24 hours
  upload:
    dir: ${UPLOAD_DIR:uploads}
