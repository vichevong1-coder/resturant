server {
    listen 80;
    server_name vongpos.com www.vongpos.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vongpos.com www.vongpos.com;

    ssl_certificate /etc/letsencrypt/live/vongpos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vongpos.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
